<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>London Transit Times</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div id="app">

    <aside id="sidebar">
      <div class="sidebar-header">
        <div class="logo">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
          </svg>
          Transit Times
        </div>
      </div>

      <div class="section">
        <div class="section-label">Locations</div>
        <div id="locations-list"></div>
        <button id="add-location-btn" class="add-btn">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
            <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
          Add location
        </button>
      </div>

      <div class="section">
        <div class="section-label">Sampling</div>
        <div class="advanced-group">
          <label>Sampling space</label>
          <div id="sampling-space-mode" class="segmented-control" role="group" aria-label="Sampling space">
            <button type="button" class="segment-btn active" data-value="radius">Radius</button>
            <button type="button" class="segment-btn" data-value="bounds">Rectangle</button>
          </div>
        </div>

        <div class="advanced-group">
          <label>Sampling area</label>
          <div id="sampling-visibility-toggle" class="segmented-control" role="group" aria-label="Sampling area visibility">
            <button type="button" class="segment-btn active" data-value="show">Show</button>
            <button type="button" class="segment-btn" data-value="hide">Hide</button>
          </div>
        </div>

        <div class="advanced-group">
          <label>Sampling density: <span id="sampling-density-display">200</span> points</label>
          <input id="sampling-density" type="range" min="60" max="500" step="10" value="200">
        </div>

        <div id="sampling-radius-controls" class="advanced-group">
          <label>Sampling radius: <span id="sampling-radius-display">8.0 km</span></label>
          <input id="sampling-radius-km" type="range" min="1" max="30" step="0.5" value="8">
        </div>
      </div>

      <button id="search-btn" class="search-btn" disabled>Show travel times</button>

      <div id="status-msg" class="status-msg hidden"></div>

      <div class="section">
        <div class="section-label">History</div>
        <div id="history-list" class="history-list"></div>
      </div>

      <div class="sidebar-footer">
        <span>Distance Matrix queries can incur Google API costs.</span>
      </div>
    </aside>

    <main id="map-container">
      <div id="map"></div>
      <div id="legend" class="legend floating-legend hidden">
        <div class="section-label" id="legend-title">Travel time from origin</div>
        <div id="legend-combine-mode" class="legend-combine-mode hidden">
          <div class="section-label">Combine mode</div>
          <div id="combine-mode" class="segmented-control combine-segmented" role="group" aria-label="Combine mode">
            <button type="button" class="segment-btn" data-value="min">Min</button>
            <button type="button" class="segment-btn" data-value="max">Max</button>
            <button type="button" class="segment-btn active" data-value="sum">Sum</button>
            <button type="button" class="segment-btn" data-value="weighted-sum">Weighted</button>
          </div>
        </div>
        <div id="legend-heatmap-view" class="legend-heatmap-view hidden">
          <div id="heatmap-view-controls" class="segmented-control" role="group" aria-label="Heatmap view"></div>
        </div>
        <div id="legend-items"></div>
      </div>
      <div id="loading" class="loading hidden">
        <div class="spinner"></div>
        <span id="loading-text">Calculating travel times…</span>
      </div>
    </main>

  </div>

  <script src="/js/map.js"></script>
  <script src="/js/app.js"></script>
  <!--
    Google Maps JS API — key injected by server.js.
    Requires: Maps JavaScript API, Distance Matrix API, Places API
    all enabled in Google Cloud Console for this key.
  -->
  <script async
    src="https://maps.googleapis.com/maps/api/js?key=%%GOOGLE_MAPS_API_KEY%%&libraries=places&callback=initApp">
  </script>
</body>
</html>
